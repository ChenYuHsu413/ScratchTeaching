# 推到 main 分支時，自動建置並部署到 GitHub Pages。
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch: # 也可在 Actions 頁面手動觸發

permissions:
  contents: read
  pages: write
  id-token: write

# 同時間只跑一個部署，新的會取代排隊中的舊的。
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
